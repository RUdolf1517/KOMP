id = "user_calculator"
name = "袣邪谢褜泻褍谢褟褌芯褉"
enabled = true
commands = []

[[scenarios]]
id = "calculator"
aliases = []
patterns = [
    "^(?:褋泻芯谢褜泻芯 斜褍写械褌|锌芯褋褔懈褌邪泄|胁褘褔懈褋谢懈|泻邪谢褜泻褍谢褟褌芯褉) (?P<expression>.+)$",
    "^(?:褋泻芯谢褜泻芯 )?(?P<expression>.+ (?:锌谢褞褋|屑懈薪褍褋|褍屑薪芯卸懈褌褜 薪邪|褉邪蟹写械谢懈褌褜 薪邪|胁 褋褌械锌械薪懈) .+)$",
]
priority = 45

[[scenarios.steps]]
id = "calculate"
action = { type = "calculate", expression = "{{expression}}", result_slot = "result" }
on_success = "speak_result"
on_error = "speak_error"

[[scenarios.steps]]
id = "speak_result"
action = { type = "say_text", text = "{{result_phrase}}.", speed = 1.0, cache = false }
on_success = "done"
on_error = "done"

[[scenarios.steps]]
id = "speak_error"
action = { type = "say_text", text = "携 薪械 褋屑芯谐 褉邪蟹芯斜褉邪褌褜 胁褘褉邪卸械薪懈械. 袩芯锌褉芯斜褍泄 褋泻邪蟹邪褌褜, 薪邪锌褉懈屑械褉: 锌芯褋褔懈褌邪泄 写胁械薪邪写褑邪褌褜 褍屑薪芯卸懈褌褜 薪邪 锌褟褌褜.", speed = 1.0, cache = true }
on_success = "done"
on_error = "done"

[[scenarios.steps]]
id = "done"
action = { type = "emit_event", event = "calculator_done", payload = {} }
