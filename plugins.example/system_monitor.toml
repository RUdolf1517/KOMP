id = "system_monitor"
name = "System monitor and media controls"
enabled = true

[[commands]]
id = "media_play_pause"
aliases = ["пауза", "поставь на паузу", "продолжи", "продолжить", "play pause", "pause", "resume"]
patterns = []
action = { type = "media_control", command = "play_pause" }

[[commands]]
id = "media_seek_forward_30"
aliases = ["перемотай вперед на тридцать секунд", "вперед на тридцать секунд", "промотай вперед", "пролистни вперед", "пролистнуть вперед", "пролистнуть на тридцать секунд", "seek forward thirty seconds"]
patterns = []
action = { type = "media_control", command = "seek_forward", seconds = 30 }

[[commands]]
id = "media_seek_backward_30"
aliases = ["отмотай на тридцать секунд", "назад на тридцать секунд", "перемотай назад", "отмотай назад", "rewind thirty seconds"]
patterns = []
action = { type = "media_control", command = "seek_backward", seconds = 30 }

[[commands]]
id = "media_next"
aliases = ["следующий", "дальше", "переключи дальше", "следующий слайд", "next", "next slide"]
patterns = []
action = { type = "hotkey", keys = ["right"] }

[[commands]]
id = "media_previous"
aliases = ["предыдущий", "назад", "переключи назад", "предыдущий слайд", "previous", "back"]
patterns = []
action = { type = "hotkey", keys = ["left"] }

[[commands]]
id = "scroll_down"
aliases = ["пролистай вниз", "листай вниз", "вниз", "scroll down"]
patterns = []
action = { type = "hotkey", keys = ["page_down"] }

[[commands]]
id = "scroll_up"
aliases = ["пролистай вверх", "листай вверх", "вверх", "scroll up"]
patterns = []
action = { type = "hotkey", keys = ["page_up"] }
